			Y: 36
			Width: 120
			Height: 22
			Font: TinyBold
		Button@DATABASE_ACTORS_TAB:
			X: 135
			Y: 36
			Width: 120
			Height: 22
			Font: TinyBold
		Button@DATABASE_TRAIN_OPPOSITE_ISLAND_BUTTON:
			X: 270
			Y: 36
			Width: 130
			Height: 22
			Font: TinyBold
			Text: button-editor-train-opposite-island
		Button@DATABASE_TRAIN_OPPOSITE_RING_BUTTON:
			X: 405
			Y: 36
			Width: 130
			Height: 22
			Font: TinyBold
			Text: button-editor-train-opposite-ring
		Button@DATABASE_TRAIN_SIMILAR_BUTTON:
			X: 540
			Y: 36
			Width: 100
			Height: 22
			Font: TinyBold
