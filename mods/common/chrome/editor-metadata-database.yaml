			X: 645
			Y: 36
			Width: 140
			Height: 22
			Font: TinyBold
			Text: button-editor-train-orientation-island
		Button@DATABASE_TRAIN_ORIENTATION_RING_BUTTON:
			X: 790
			Y: 36
			Width: 140
			Height: 22
			Font: TinyBold
			Text: button-editor-train-orientation-ring
		Button@DATABASE_TRAIN_RELATED_CORNERS_ISLAND_BUTTON:
			X: 935
			Y: 36
			Width: 115
			Height: 22
			Font: TinyBold
			Text: button-editor-train-related-corners-island
		Button@DATABASE_TRAIN_RELATED_CORNERS_RING_BUTTON:
			X: 1055
			Y: 36
			Width: 115
			Height: 22
			Font: TinyBold
			Text: button-editor-train-related-corners-ring
