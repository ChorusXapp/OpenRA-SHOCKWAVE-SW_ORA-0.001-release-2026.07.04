			X: 10
			Y: 62
			Width: PARENT_WIDTH - 20
			Height: 88
			Background: scrollpanel-bg
			Children:
				Label@DATABASE_TRAINING_HEADING:
					X: 10
					Y: 6
					Width: 200
					Height: 18
					Font: Bold
					Text: label-editor-currently-training
				Label@DATABASE_TRAINING_MODE:
					X: 10
					Y: 24
					Width: PARENT_WIDTH - 20
					Height: 18
					Font: TinyBold
				Container@DATABASE_TRAINING_PREVIEW_BOX:
					X: 10
					Y: 42
					Width: 72
					Height: 72
				Label@DATABASE_TRAINING_NAME:
					X: 90
					Y: 42
					Width: PARENT_WIDTH - 110
					Height: 72
					Font: Tiny
					Align: Left
		Container@DATABASE_HEADER_PANEL:
			X: 10
			Y: 154
			Width: PARENT_WIDTH - 20
			Height: 26
			Children:
				Background@DATABASE_HEADER_BACKGROUND:
					Width: PARENT_WIDTH
					Height: PARENT_HEIGHT
					Background: scrollpanel-bg
		ScrollPanel@DATABASE_ROW_PANEL:
			X: 10
			Y: 180
			Width: PARENT_WIDTH - 20
			Height: PARENT_HEIGHT - 235
			TopBottomSpacing: 2
			ItemSpacing: 2
			Children:
				ScrollItem@DATABASE_ROW_TEMPLATE:
					Visible: false
					Width: 4000
					Height: 96
		Container@DATABASE_TRAINING_SAVE_BAR:
			X: 10
			Y: PARENT_HEIGHT - 45
			Width: PARENT_WIDTH - 20
			Height: 32
			Visible: false
			Children:
				Button@DATABASE_TRAINING_SAVE_BUTTON:
					X: 0
					Width: (PARENT_WIDTH - 10) / 2
					Height: 28
					Text: Save
					Font: Bold
				Button@DATABASE_TRAINING_CANCEL_BUTTON:
					X: 5 + (PARENT_WIDTH - 10) / 2
					Width: (PARENT_WIDTH - 10) / 2
					Height: 28
					Text: button-cancel
					Font: Bold
		EditorImmediateCloseButton@DATABASE_CLOSE_BUTTON:
			X: PARENT_WIDTH - 50
			Y: 4
			Width: 44
			Height: 32
			Text: X
			Key: escape
			Font: Bold

